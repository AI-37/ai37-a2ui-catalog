name: Publish catalog to GitHub Pages

# Публикует артефакты каталога (catalog.json + JSON Schema компонентов) на GitHub Pages.
# Итоговый URL совпадает с CATALOG_ID из packages/catalog-schemas/src/constants.ts:
#   https://ai-37.github.io/ai37-a2ui-catalog/a2ui/catalogs/ai37-a2ui/v1/catalog.json
# Это резолвимая идентичность каталога, на которую ссылается каждый A2UI-payload
# (createSurface.catalogId) и content-negotiation вывода (@ai37/agent-sdk).

on:
  push:
    branches:
      - main
    paths:
      - 'packages/catalog-schemas/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой Pages за раз; новый отменяет незавершённый старый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build catalog artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ./public — ИСТОЧНИК ПРАВДЫ: закоммичен и содержит ВСЕ версии (старые заморожены, текущая
      # сгенерирована и закоммичена локально через `pnpm run export:public`). Воркфлоу НЕ генерирует —
      # только проверяет актуальность текущей версии и деплоит как есть (deploy-pages заливает ./public
      # как весь сайт, поэтому накопленные версии сохраняются).
      - name: Verify ./public is up to date with source
        run: pnpm run verify:public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
