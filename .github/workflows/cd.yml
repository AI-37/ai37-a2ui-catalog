name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_ci:
        description: Skip the reusable CI workflow before publishing
        required: true
        default: false
        type: boolean
      publish_npm:
        description: Publish npm packages
        required: true
        default: true
        type: boolean
      publish_pypi:
        description: Publish the Python package to PyPI
        required: true
        default: true
        type: boolean

jobs:
  ci:
    name: Reuse CI
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_ci }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release_metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    needs:
      - ci
    if: ${{ always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          package_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/catalog-schemas/package.json', 'utf8')).version)")

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag_version=${GITHUB_REF_NAME#v}
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "Git tag version ($tag_version) does not match package version ($package_version)." >&2
              exit 1
            fi
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

  publish_npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs:
      - release_metadata
    if: ${{ needs.release_metadata.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_npm) }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm packages
        run: pnpm -r --filter './packages/**' run build

      - name: Publish @ai37/a2ui-catalog-schemas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @ai37/a2ui-catalog-schemas publish --access public --no-git-checks --registry https://registry.npmjs.org/

      - name: Publish @ai37/a2ui-catalog-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @ai37/a2ui-catalog-react publish --access public --no-git-checks --registry https://registry.npmjs.org/

  publish_pypi:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs:
      - release_metadata
    if: ${{ needs.release_metadata.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_pypi) }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: poetry
          cache-dependency-path: packages/catalog-python/poetry.lock

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install dependencies
        run: poetry -C packages/catalog-python install --no-interaction

      - name: Build Python package
        run: poetry -C packages/catalog-python build

      - name: Publish Python package
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry -C packages/catalog-python publish --no-interaction --username __token__ --password "$PYPI_API_TOKEN"
