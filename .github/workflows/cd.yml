name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_ci:
        description: Skip the reusable CI workflow before publishing and deploy
        required: true
        default: false
        type: boolean
      publish_npm:
        description: Publish npm packages
        required: true
        default: true
        type: boolean
      publish_pypi:
        description: Publish the Python package to PyPI
        required: true
        default: true
        type: boolean
      publish_container:
        description: Build and push the OCI image to GHCR
        required: true
        default: true
        type: boolean
      deploy_chart:
        description: Deploy the chart with Helm after publishing the image
        required: true
        default: true
        type: boolean

jobs:
  ci:
    name: Reuse CI
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_ci }}
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release_metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    needs:
      - ci
    if: ${{ always() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      helm_release: ${{ steps.meta.outputs.helm_release }}
      kube_namespace: ${{ steps.meta.outputs.kube_namespace }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version and deployment targets
        id: meta
        env:
          GHCR_IMAGE_REPOSITORY_PREFIX: ${{ vars.GHCR_IMAGE_REPOSITORY_PREFIX }}
          GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}
          HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
          KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE }}
        run: |
          package_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/catalog-schemas/package.json', 'utf8')).version)")
          image_prefix=${GHCR_IMAGE_REPOSITORY_PREFIX:-ghcr.io/${GITHUB_REPOSITORY_OWNER}}
          image_repository=${GHCR_IMAGE_NAME:-ai37-a2ui-catalog}
          helm_release=${HELM_RELEASE_NAME:-a2ui-catalog}
          kube_namespace=${KUBE_NAMESPACE:-a2ui-catalog}

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag_version=${GITHUB_REF_NAME#v}
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "Git tag version ($tag_version) does not match package version ($package_version)." >&2
              exit 1
            fi
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "image_prefix=$image_prefix" >> "$GITHUB_OUTPUT"
          echo "image_repository=$image_repository" >> "$GITHUB_OUTPUT"
          echo "image_tag=$package_version" >> "$GITHUB_OUTPUT"
          echo "helm_release=$helm_release" >> "$GITHUB_OUTPUT"
          echo "kube_namespace=$kube_namespace" >> "$GITHUB_OUTPUT"

  publish_npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs:
      - release_metadata
    if: ${{ needs.release_metadata.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_npm) }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm packages
        run: pnpm -r --filter './packages/**' run build

      - name: Publish @ai37/a2ui-catalog-schemas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @ai37/a2ui-catalog-schemas publish --access public --no-git-checks --registry https://registry.npmjs.org/

      - name: Publish @ai37/a2ui-catalog-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @ai37/a2ui-catalog-react publish --access public --no-git-checks --registry https://registry.npmjs.org/

  publish_pypi:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs:
      - release_metadata
    if: ${{ needs.release_metadata.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_pypi) }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: poetry
          cache-dependency-path: packages/catalog-python/poetry.lock

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install dependencies
        run: poetry -C packages/catalog-python install --no-interaction

      - name: Build Python package
        run: poetry -C packages/catalog-python build

      - name: Publish Python package
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: poetry -C packages/catalog-python publish --no-interaction --username __token__ --password "$PYPI_API_TOKEN"

  publish_container:
    name: Publish container image
    runs-on: ubuntu-latest
    needs:
      - release_metadata
    if: ${{ needs.release_metadata.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_container) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push image
        env:
          IMAGE_PREFIX: ${{ needs.release_metadata.outputs.image_prefix }}
          IMAGE_REPOSITORY: ${{ needs.release_metadata.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.release_metadata.outputs.image_tag }}
        run: |
          image_ref="$IMAGE_PREFIX/$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker build -t "$image_ref" .
          docker push "$image_ref"

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs:
      - release_metadata
      - publish_container
    if: ${{ needs.release_metadata.result == 'success' && (needs.publish_container.result == 'success' || needs.publish_container.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.deploy_chart) }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          kubeconfig_path="$RUNNER_TEMP/kubeconfig"
          printf '%s' "$KUBECONFIG_B64" | base64 --decode > "$kubeconfig_path"
          chmod 600 "$kubeconfig_path"
          echo "KUBECONFIG=$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Deploy chart
        env:
          IMAGE_PREFIX: ${{ needs.release_metadata.outputs.image_prefix }}
          IMAGE_REPOSITORY: ${{ needs.release_metadata.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.release_metadata.outputs.image_tag }}
          HELM_RELEASE: ${{ needs.release_metadata.outputs.helm_release }}
          KUBE_NAMESPACE: ${{ needs.release_metadata.outputs.kube_namespace }}
          HELM_VALUES_FILE: ${{ vars.HELM_VALUES_FILE }}
          HELM_EXTRA_ARGS: ${{ vars.HELM_EXTRA_ARGS }}
        run: |
          values_args=()
          if [[ -n "$HELM_VALUES_FILE" ]]; then
            values_args+=(--values "$HELM_VALUES_FILE")
          fi

          helm upgrade --install "$HELM_RELEASE" ./chart \
            --namespace "$KUBE_NAMESPACE" \
            --create-namespace \
            --set global.imageRepositoryPrefix="$IMAGE_PREFIX" \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set global.imageTag="$IMAGE_TAG" \
            "${values_args[@]}" \
            $HELM_EXTRA_ARGS
