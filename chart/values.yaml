nameOverride: ""
fullnameOverride: "a2ui-catalog"

global:
  imageRepositoryPrefix: "ghcr.io/ai-37"
  imageTag: latest
  imagePullSecrets:
    - ghcr-pull

replicaCount: 1

image:
  repository: ai37-a2ui-catalog
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: http

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    acme.cert-manager.io/http01-ingress-class: "nginx"
  hosts:
    - host: "a2ui-schemas.dev.ai37.ru"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: "a2ui-schemas-dev-ai37-ru-tls"
      hosts:
        - "a2ui-schemas.dev.ai37.ru"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

probes:
  startup:
    httpGet:
      path: /a2ui/catalogs/ai37-a2ui/v1/catalog.json
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12
  readiness:
    httpGet:
      path: /a2ui/catalogs/ai37-a2ui/v1/catalog.json
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    httpGet:
      path: /a2ui/catalogs/ai37-a2ui/v1/catalog.json
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}
affinity: {}
tolerations: []
